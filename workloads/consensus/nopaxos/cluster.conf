# NOPaxos cluster config (replica/client)
# Syntax:
#   f <failures>
#   replica <host>:<port>
#   ...
#   multicast <addr>:<port>   (optional, used by OUM; broadcast ok for testing)
f 1

# 3 replicas (tolerate 1 failure with 2f+1 = 3)
replica 177.0.0.11:12000
replica 177.0.0.31:12000
replica 177.0.0.41:12000

# OUM group address (broadcast for testing)
multicast 177.0.0.255:12000
