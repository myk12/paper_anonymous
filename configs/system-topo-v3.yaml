        ip: 177.0.4.1/16
        mac: 00:0a:35:06:09:3c
        tofino_port: leaf2_p4
      - id: p2
        ifname: enp177s0np1
        netns: ns_fpga_4_p2
        ip: 177.0.4.2/16
        mac: 00:0a:35:06:09:3d
        tofino_port: opt_p4

  - id: fpga_5
    hostname: host3
    network_interfaces:
      - id: p1
        ifname: enp202s0np0
        netns: ns_fpga_5_p1
        ip: 177.0.5.1/16
        mac: 00:0a:35:06:0b:72
        tofino_port: leaf3_p2
      - id: p2
        ifname: enp202s0np1
        netns: ns_fpga_5_p2
        ip: 177.0.5.2/16
        mac: 00:0a:35:06:0b:73
        tofino_port: opt_p5

  - id: fpga_6
    hostname: host3
    network_interfaces:
      - id: p1
        ifname: enp177s0np0
